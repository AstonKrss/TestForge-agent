name: Bug report
description: Report a reproducible TestForge bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: "TestForge failed to..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Please include the CLI command or natural-language task.
      placeholder: |
        1. Run `python run_cli.py`
        2. Choose `2. 进入 CLI 测试`
        3. Type `完整测试 http://example.com`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste the relevant CLI output. Redact credentials and tokens.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Python / OS
      placeholder: "Python 3.12, Windows 11"

  - type: input
    id: model
    attributes:
      label: AI provider and model
      placeholder: "local / gemma4:e4b"

  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts
      description: Add paths to reports or failure artifacts if available.
      placeholder: "~/.testforge/artifacts/default/failure-..."
